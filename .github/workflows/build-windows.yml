name: Build - Windows - RealOTX 7.72

on:
  workflow_dispatch:

jobs:
  build:
    name: Windows Release x64
    runs-on: windows-2022

    steps:
      - name: Checkout RealOTX-7.72
        uses: actions/checkout@v4

      - name: Checkout OTX SDK from otxserv2
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://github.com/macenovski/otxserver.git otxsdk
          cd otxsdk
          git sparse-checkout set sources/otx-windows-sdk
          git checkout otxserv2
          cd ..
          echo "TFSSDKDir=${{ github.workspace }}\otxsdk\sources\otx-windows-sdk" >> $env:GITHUB_ENV

      - name: Download and install Boost 1.69
        run: |
          curl -L "https://boostorg.jfrog.io/artifactory/main/release/1.69.0/source/boost_1_69_0.zip" -o boost.zip
          Expand-Archive boost.zip -DestinationPath C:\local
          cd C:\local\boost_1_69_0
          .\bootstrap.bat
          .\b2.exe address-model=64 variant=release link=static runtime-link=shared --with-system --with-filesystem --with-iostreams --with-thread --with-chrono --with-date_time --with-regex --with-program_options --stagedir=stage64 stage
          New-Item -ItemType Directory -Force "C:\local\boost_1_69_0\lib64-msvc-14.0"
          Copy-Item "C:\local\boost_1_69_0\stage64\lib\*" "C:\local\boost_1_69_0\lib64-msvc-14.0\" -Force
          echo "BOOST_ROOT=C:\local\boost_1_69_0" >> $env:GITHUB_ENV

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: |
          msbuild sources/msvc/TheOTXServer.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: realotx-7.72-windows-x64
          path: sources/msvc/x64/Release/
