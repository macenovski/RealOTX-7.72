name: Build - Windows - RealOTX 7.72

on:
  workflow_dispatch:

jobs:
  build:
    name: Windows Release x64
    runs-on: windows-2022

    steps:
      - name: Checkout RealOTX-7.72
        uses: actions/checkout@v4

      - name: Checkout OTX SDK from otxserv2
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://github.com/macenovski/otxserver.git otxsdk
          cd otxsdk
          git sparse-checkout set sources/otx-windows-sdk
          git checkout otxserv2
          cd ..
          echo "TFSSDKDir=${{ github.workspace }}\otxsdk\sources\otx-windows-sdk" >> $env:GITHUB_ENV

      - name: Install Boost via vcpkg
        run: |
          C:\vcpkg\vcpkg install boost:x64-windows-static
          echo "BOOST_ROOT=C:\vcpkg\installed\x64-windows-static" >> $env:GITHUB_ENV

      - name: Fix Boost lib path
        run: |
          New-Item -ItemType Directory -Force "C:\vcpkg\installed\x64-windows-static\lib64-msvc-14.0"
          Copy-Item "C:\vcpkg\installed\x64-windows-static\lib\*" "C:\vcpkg\installed\x64-windows-static\lib64-msvc-14.0\" -Force

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: |
          msbuild sources/msvc/TheOTXServer.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: realotx-7.72-windows-x64
          path: sources/msvc/x64/Release/
